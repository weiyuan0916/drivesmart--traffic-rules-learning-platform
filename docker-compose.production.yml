# ============================================================
# Docker Compose — Production Environment
# Optimized for high availability
# ============================================================
# Usage: docker compose -f docker-compose.production.yml up -d

services:
  # ============================================================
  # Frontend — Production
  # ============================================================
  frontend:
    image: ${REGISTRY}/frontend:${IMAGE_TAG:-latest}
    ports:
      - "80:80"
      - "443:443"
    environment:
      - NODE_ENV=production
      - VITE_API_URL=${VITE_API_URL}
    volumes:
      - ./certs:/etc/nginx/certs:ro
      - ./nginx.production.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - production-network
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================
  # Backend — Production API
  # ============================================================
  backend:
    image: ${REGISTRY}/backend:${IMAGE_TAG:-latest}
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CLOUDINARY_URL=${CLOUDINARY_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./data:/app/data
    networks:
      - production-network
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3002/api/v1/listening/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# ============================================================
# Networks
# ============================================================
networks:
  production-network:
    driver: bridge
