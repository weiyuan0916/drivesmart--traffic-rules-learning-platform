# ============================================================
# Kubernetes — Backend Deployment (Staging)
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: drivesmart
  labels:
    app: backend
    env: staging
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        env: staging
    spec:
      containers:
        - name: backend
          image: ghcr.io/drivesmart-traffic-rules-learning-platform/backend:latest
          ports:
            - containerPort: 3002
              name: http
          env:
            - name: NODE_ENV
              value: staging
            - name: PORT
              value: "3002"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: database-url
            - name: REDIS_URL
              value: redis://redis:6379
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: gemini-api-key
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /api/v1/listening/health
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/listening/health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: drivesmart
spec:
  type: ClusterIP
  ports:
    - port: 3002
      targetPort: 3002
      name: http
  selector:
    app: backend
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend
  namespace: drivesmart
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - api-staging.drivesmart.app
      secretName: backend-tls
  rules:
    - host: api-staging.drivesmart.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3002
