# ============================================================
# .github/workflows/scheduled.yml
# Scheduled Tasks (Dependency Updates, Cleanup)
# ============================================================

name: Scheduled Tasks

on:
  schedule:
    # Every Monday at 6:00 AM UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

env:
  NODE_VERSION: '22'

jobs:
  # ============================================================
  # Dependency Audit
  # ============================================================
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Report audit results
        if: always()
        run: |
          if [ -f audit-report.json ]; then
            echo "## Dependency Audit Results" >> $GITHUB_STEP_SUMMARY
            cat audit-report.json >> $GITHUB_STEP_SUMMARY
          fi

  # ============================================================
  # Cleanup Old Artifacts
  # ============================================================
  cleanup-artifacts:
    name: Cleanup Old Artifacts
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Delete old artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            const sevenDaysAgo = Date.now() - 7 * 24 * 60 * 60 * 1000;

            for (const artifact of artifacts.data.artifacts) {
              if (new Date(artifact.updated_at).getTime() < sevenDaysAgo) {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id,
                });
                console.log(`Deleted: ${artifact.name}`);
              }
            }

  # ============================================================
  # Cache Maintenance
  # ============================================================
  cache-maintenance:
    name: Cache Maintenance
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Clear old cache
        uses: actions/github-script@v7
        with:
          script: |
            const caches = await github.rest.actions.getActionsCacheList({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const sevenDaysAgo = Date.now() - 7 * 24 * 60 * 60 * 1000;

            for (const cache of caches.data.actions_caches) {
              if (new Date(cache.last_accessed_at).getTime() < sevenDaysAgo) {
                try {
                  await github.rest.actions.deleteActionsCacheById({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    cache_id: cache.id,
                  });
                  console.log(`Deleted cache: ${cache.cache_key}`);
                } catch (error) {
                  console.log(`Failed to delete: ${cache.cache_key}`);
                }
              }
            }
